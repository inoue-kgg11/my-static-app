<!DOCTYPE html>

<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>リアルタイム絵しりとり（MVP）</title>
    <script src="https://unpkg.com/@azure/web-pubsub-client"></script>

    <style>
        body {
            text-align: center;
            font-family: sans-serif;
        }

        canvas {
            border: 2px solid #333;
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <h1>🎨 リアルタイムお絵かき</h1>

    <canvas id="canvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        let drawing = false;

        // ★ あなたのWeb PubSub URLに変更
        const url = "wss://YOUR-ENDPOINT.webpubsub.azure.com/client/hubs/chat";

        const client = new WebPubSubClient(url);

        client.on("message", e => {
            const data = JSON.parse(e.message.data);

            draw(data.x, data.y);
        });

        client.start();

        // 描画
        function draw(x, y) {
            ctx.fillRect(x, y, 4, 4);
        }

        // マウス操作
        canvas.addEventListener("mousedown", () => drawing = true);
        canvas.addEventListener("mouseup", () => drawing = false);

        canvas.addEventListener("mousemove", e => {
            if (!drawing) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            draw(x, y);

            client.send(JSON.stringify({ x, y }));
        });
    </script>

</body>

</html>
