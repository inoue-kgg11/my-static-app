<!DOCTYPE html>

<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真奈美ちゃんのうんこワールド💩</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #fff7e6, #ffe0b3);
            text-align: center;
            overflow: hidden;
        }

        h1 {
            margin-top: 30px;
            color: #5a3e1b;
        }

        .card {
            background: white;
            margin: 20px auto;
            padding: 20px;
            border-radius: 16px;
            width: 300px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        /* ボタン */
        button {
            margin-top: 15px;
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            background: #8b5a2b;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.1);
        }

        /* スコア */
        .score {
            font-size: 2rem;
            margin-top: 10px;
            color: #5a3e1b;
        }

        /* うんこアニメ */
        .poop {
            position: absolute;
            font-size: 30px;
            animation: fall linear;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh);
            }

            100% {
                transform: translateY(110vh);
            }
        }
    </style>

</head>

<body>

    <h1>💩 真奈美ちゃんの世界 💩</h1>

    <div class="card">
        <h2>プロフィール</h2>
        <p>名前：真奈美ちゃん</p>
        <p>属性：うんこマスター💩</p>
        <p>好き：ポヨン音とスコア稼ぎ</p>
    </div>

    <div class="card">
        <h2>クリックしてね</h2>
        <button onclick="clickPoop()">💩 タップ！</button>
        <div class="score">スコア: <span id="score">0</span></div>
    </div>

    <audio id="poopSound">
        <source src="https://www.soundjay.com/button/sounds/button-16.mp3" type="audio/mpeg">
    </audio>

    <script>
        let score = 0;

        // クリック処理
        function clickPoop() {
            score++;
            document.getElementById("score").innerText = score;

            // 音
            const sound = document.getElementById("poopSound");
            sound.currentTime = 0;
            sound.play();

            // うんこアニメ
            const poop = document.createElement("div");
            poop.className = "poop";
            poop.innerText = "💩";

            poop.style.left = Math.random() * 100 + "vw";
            poop.style.top = "-10vh";
            poop.style.animationDuration = (Math.random() * 2 + 2) + "s";

            document.body.appendChild(poop);

            setTimeout(() => poop.remove(), 4000);
        }

        // 自動で降る
        setInterval(() => {
            const poop = document.createElement("div");
            poop.className = "poop";
            poop.innerText = "💩";

            poop.style.left = Math.random() * 100 + "vw";
            poop.style.animationDuration = (Math.random() * 3 + 2) + "s";

            document.body.appendChild(poop);

            setTimeout(() => poop.remove(), 5000);
        }, 500);
    </script>

</body>

</html>
