<!DOCTYPE html>

<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真奈美ちゃんのうんこワールド💩</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #fff7e6, #ffe0b3);
            overflow: hidden;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            font-size: 2.5rem;
            color: #5a3e1b;
        }

        p {
            color: #7a5c2e;
        }

        /* うんこアニメーション */
        .poop {
            position: absolute;
            font-size: 40px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ボタン */
        button {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 30px;
            background: #8b5a2b;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #a66b33;
            transform: scale(1.1);
        }

        /* メッセージ */
        #message {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <h1>💩 真奈美ちゃん専用 💩</h1>
    <p>ようこそ、世界で一番ゆるいホームページへ</p>

    <button onclick="showMessage()">クリックしてね</button>

    <div id="message"></div>

    <script>
        // うんこを降らせる
        function createPoop() {
            const poop = document.createElement("div");
            poop.className = "poop";
            poop.innerText = "💩";

            poop.style.left = Math.random() * 100 + "vw";
            poop.style.animationDuration = (Math.random() * 3 + 2) + "s";

            document.body.appendChild(poop);

            setTimeout(() => {
                poop.remove();
            }, 5000);
        }

        setInterval(createPoop, 300);

        // メッセージ
        function showMessage() {
            const messages = [
                "今日もいい💩出てるね！",
                "運気アップ中💩✨",
                "最高のコンディション！",
                "真奈美ちゃん優勝🏆",
                "💩 is power"
            ];

            const random = messages[Math.floor(Math.random() * messages.length)];
            document.getElementById("message").innerText = random;
        }
    </script>

</body>

</html>
