<!DOCTYPE html>
<html>

<body>
    <h1>Static Web Apps</h1>

    <button onclick="callApi()">Call API</button>
    <p id="result"></p>

    <script>
        function callApi() {
            fetch('/api/hello')
                .then(res => res.text())
                .then(data => {
                    document.getElementById('result').innerText = data;
                });
        }
    </script>

</body>

</html>
